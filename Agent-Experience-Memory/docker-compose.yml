services:
  mysql:
    image: mysql:8.4
    container_name: agent_memory_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: agent_memory
      MYSQL_USER: agent
      MYSQL_PASSWORD: agent123456
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - agent_memory_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  agent_memory_mysql_data:
